version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/frontend/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Low-risk updates: batched into one PR and auto-merged once CI
      # (incl. the production smoke test) passes. See dependabot-auto-merge.yml.
      frontend-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Breaking updates: batched into one PR but left for manual review.
      frontend-major:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "cargo"
    directory: "/backend/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      backend-major:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      root-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      root-major:
        patterns:
          - "*"
        update-types:
          - "major"
